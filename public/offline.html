<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floussi - Mode Hors-ligne</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid #f1f5f9;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 22px;
            font-weight: 800;
            margin: 0 0 10px 0;
            color: #0f172a;
        }
        p {
            font-size: 13px;
            color: #64748b;
            line-height: 1.6;
            margin: 0 0 24px 0;
        }
        .btn {
            background-color: #10b981;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            display: inline-block;
            transition: background-color 0.2s;
        }
        .btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🐪</div>
        <h1>Makaynsh Internet !</h1>
        <p>Il semblerait que vous soyez hors-ligne. Floussi sauvegarde automatiquement vos dépenses localement. Elles seront synchronisées dès que vous retrouverez du réseau !</p>
        <a href="/" class="btn">Réessayer la connexion</a>
    </div>
</body>
</html>
